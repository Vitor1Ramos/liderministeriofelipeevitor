  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }

  /* ==================== PRINT / PDF (3 PÁGINAS) ==================== */
  @media print {
    @page { size: A4 portrait; margin: 1.2cm; }
    html, body { background: white !important; height: auto !important; overflow: visible !important; }
    body { color: #0f172a !important; }
    .no-print { display: none !important; }

    /* Reset layout do app pra fluir naturalmente */
    .app-shell { display: block !important; height: auto !important; overflow: visible !important; }
    .app-main { display: block !important; height: auto !important; overflow: visible !important; }
    .app-content { height: auto !important; overflow: visible !important; padding: 0 !important; }
    .max-w-7xl { max-width: 100% !important; }

    /* Quebras de página */
    .print-page { page-break-after: always; break-after: page; padding-top: 0 !important; }
    .print-page:last-child { page-break-after: auto; break-after: auto; }
    .print-card { box-shadow: none !important; border: 1px solid #cbd5e1 !important; break-inside: avoid; }
    .avoid-break { break-inside: avoid; page-break-inside: avoid; }

    /* Forçar tema claro para impressão */
    html.dark * { color-scheme: light !important; }
    html.dark .bg-white,
    html.dark .bg-slate-50,
    html.dark .bg-slate-100,
    html.dark .bg-slate-800 { background-color: white !important; }

    html.dark, html.dark * { color: #0f172a !important; border-color: #cbd5e1 !important; }

    html.dark .text-slate-400, html.dark .text-slate-500, html.dark .text-slate-600,
    html.dark .text-slate-700, html.dark .text-slate-800, html.dark .text-slate-900 { color: #1e293b !important; }
  }

  /* ==================== DARK MODE (override de classes Tailwind) ==================== */
  html.dark { color-scheme: dark; }
  html.dark body { background-color: #0f172a; color: #e2e8f0; }
  html.dark .bg-white { background-color: #1e293b !important; }
  html.dark .bg-slate-50 { background-color: #0f172a !important; }
  html.dark .bg-slate-100 { background-color: #334155 !important; }
  html.dark .text-slate-800, html.dark .text-slate-700 { color: #f1f5f9 !important; }
  html.dark .text-slate-600 { color: #cbd5e1 !important; }
  html.dark .text-slate-500, html.dark .text-slate-400 { color: #94a3b8 !important; }
  html.dark [class*=" border-"], html.dark [class^="border-"], html.dark .border { border-color: #334155 !important; }
  html.dark input, html.dark select, html.dark textarea { background-color: #0f172a !important; color: #f1f5f9 !important; border-color: #334155 !important; }
  html.dark thead.bg-slate-50, html.dark thead.bg-slate-100 { background-color: #334155 !important; }
  html.dark .hover\:bg-slate-50:hover, html.dark .hover\:bg-slate-100:hover { background-color: #334155 !important; }
  html.dark .bg-indigo-50 { background-color: rgba(99,102,241,0.15) !important; }
  html.dark .bg-rose-50 { background-color: rgba(244,63,94,0.15) !important; }
  html.dark .bg-emerald-50 { background-color: rgba(16,185,129,0.15) !important; }
  html.dark .bg-amber-50 { background-color: rgba(251,191,36,0.15) !important; }
  html.dark .text-amber-800, html.dark .text-amber-900 { color: #fcd34d !important; }
  html.dark .ring-2 { box-shadow: 0 0 0 2px rgba(99,102,241,0.5) !important; }

  /* Smooth animations */
  @keyframes fade-in { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .animate-fade-in { animation: fade-in 300ms ease-out; }

  /* Custom scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  html.dark ::-webkit-scrollbar-thumb { background: #475569; }

  /* Toast */
  .toast-enter { animation: toast-in 250ms ease-out; }
  @keyframes toast-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* Capture area fix */
  .capturing { 
    background-color: #f8fafc !important; /* Tailwind slate-50 */
    border-radius: 0 !important;
  }
  .capturing .overflow-x-auto { overflow: visible !important; }

  .capturing ::-webkit-scrollbar { display: none; }

  @media (min-width: 1024px) {
    .grid-auto-balanced { grid-template-columns: repeat(var(--cols, 3), minmax(0, 1fr)); }

      const parsed = safeJSONParse(raw);

      return (parsed && typeof parsed === "object" && parsed.data && typeof parsed.data === "object") ? parsed.data : parsed;
    } catch (e) { console.warn("LocalStorage indisponível.", e); return null; }
  };
  const saveLocalData = (data) => {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({ version: 2, savedAt: new Date().toISOString(), data }));
      return true;
    } catch (e) { console.warn("Falha ao salvar localmente.", e); return false; }
  };

  let INITIAL_DATA = loadLocalData() || fromBase64(DATA_B64) || {};

  const COLOR_OPTIONS = [
    { label: "Vermelho", value: "bg-rose-600 text-white" },
    { label: "Azul", value: "bg-blue-600 text-white" },
    { label: "Laranja", value: "bg-orange-600 text-white" },
    { label: "Âmbar", value: "bg-amber-600 text-white" },
    { label: "Verde", value: "bg-emerald-600 text-white" },
    { label: "Indigo", value: "bg-indigo-600 text-white" },
    { label: "Roxo", value: "bg-purple-600 text-white" },
    { label: "Rosa", value: "bg-pink-600 text-white" },
    { label: "Ciano", value: "bg-cyan-600 text-white" },
    { label: "Cinza", value: "bg-slate-600 text-white" },
    { label: "Amarelo", value: "bg-yellow-600 text-white" },
    { label: "Lima", value: "bg-lime-600 text-white" }
  ];

  // Tipos de evento (estilo Planning Center)
  const EVENT_TYPES = {
    sunday:    { label: "Culto de Domingo", color: "bg-slate-900", icon: "⛪" },
    saturday:  { label: "Culto de Sábado",  color: "bg-purple-600", icon: "🌙" },
    midweek:   { label: "Culto de Meio de Semana", color: "bg-blue-600", icon: "📖" },
    rehearsal: { label: "Ensaio", color: "bg-amber-600", icon: "🎵" },
    special:   { label: "Evento Especial", color: "bg-rose-600", icon: "✨" }
  };

  // ====================================================================
  // HELPERS DE DATA
  // ====================================================================
  const toISODate = (d) => {
    const yr = d.getFullYear();
    const mo = String(d.getMonth() + 1).padStart(2, '0');
    const da = String(d.getDate()).padStart(2, '0');
    return `${yr}-${mo}-${da}`;
  };
  const fromISODate = (s) => {
    const [y, m, d] = s.split('-').map(Number);
    return new Date(y, m - 1, d);
  };
  const getNextSundays = (refDate, count = 5) => {
    const dates = [];
    let d = new Date(refDate);
    d.setHours(0, 0, 0, 0);
    const day = d.getDay();
    const diff = (7 - day) % 7;
    d.setDate(d.getDate() + diff);
    for (let i = 0; i < count; i++) {
      dates.push(new Date(d));
      d.setDate(d.getDate() + 7);
    }
    return dates;
  };
  const formatDateShort = (d) => d ? d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" }) : "";
  const formatDateFull = (d) => d ? d.toLocaleDateString("pt-BR", { weekday: "long", day: "numeric", month: "long" }) : "";
  const formatWeekday = (d) => d ? d.toLocaleDateString("pt-BR", { weekday: "short" }).replace(".", "").toUpperCase() : "";

  // ====================================================================
  // COMPONENTE PRINCIPAL
  // ====================================================================
  function MinistryScheduler() {
    const [activeTab, setActiveTab] = useState('dashboard');
    const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
    const [roles, setRoles] = useState(() => INITIAL_DATA.roles || {});
    const [members, setMembers] = useState(() =>
      (INITIAL_DATA.members || []).map(m => ({ ...m, roles: m.roles ? m.roles : (m.role ? [m.role] : []) }))
    );
    const [unavailability, setUnavailability] = useState(() => INITIAL_DATA.unavailability || {});
    const [roster, setRoster] = useState(() => INITIAL_DATA.roster || {});
    const [customEvents, setCustomEvents] = useState(() => INITIAL_DATA.customEvents || []);
    const [eventNotes, setEventNotes] = useState(() => INITIAL_DATA.eventNotes || {});

    // UI / view state
    const [baseDate, setBaseDate] = useState(new Date());
    const [weeksToShow, setWeeksToShow] = useState(5);
    const [memberSearch, setMemberSearch] = useState('');
    const [toast, setToast] = useState(null);
    const [exportImageModal, setExportImageModal] = useState(null);
    const [theme, setTheme] = useState(() => {
      try { return localStorage.getItem('LouvorApp:theme') || 'light'; } catch { return 'light'; }
    });
    const [showTextModal, setShowTextModal] = useState(null); // string ou null

    // Aplica/remove classe dark no <html>
    useEffect(() => {
      const root = document.documentElement;
      if (theme === 'dark') root.classList.add('dark'); else root.classList.remove('dark');
      try { localStorage.setItem('LouvorApp:theme', theme); } catch {}
    }, [theme]);

    // Modais
    const [showAddMemberModal, setShowAddMemberModal] = useState(false);
    const [showAddCategoryModal, setShowAddCategoryModal] = useState(false);
    const [showAddEventModal, setShowAddEventModal] = useState(false);
    const [showNotesModal, setShowNotesModal] = useState(null); // dateStr ou null

    // Forms
    const [newMemberName, setNewMemberName] = useState('');
    const [newMemberRoles, setNewMemberRoles] = useState(['VOCAL']);
    const [editingMemberId, setEditingMemberId] = useState(null);
    const [editName, setEditName] = useState('');
    const [editRoles, setEditRoles] = useState([]);
    const [newCategoryName, setNewCategoryName] = useState('');
    const [newCategoryColor, setNewCategoryColor] = useState(COLOR_OPTIONS[0].value);
    const [editingCategoryKey, setEditingCategoryKey] = useState(null);
    const [editCategoryName, setEditCategoryName] = useState('');
    const [editCategoryColor, setEditCategoryColor] = useState('');

    // Form do novo evento
    const [newEventDate, setNewEventDate] = useState(toISODate(new Date()));
    const [newEventType, setNewEventType] = useState('saturday');
    const [newEventTitle, setNewEventTitle] = useState('');
    const [newEventTime, setNewEventTime] = useState('19:30');

    // ============ CONTROLE DE ACESSO ============
    const ADMIN_PASSWORD = 'Anah@76';
    const [editMode, setEditMode] = useState(() => {
      try { return sessionStorage.getItem('LouvorApp:editMode') === '1'; } catch { return false; }
    });
    const [showPasswordModal, setShowPasswordModal] = useState(false);
    const [passwordInput, setPasswordInput] = useState('');
    const [passwordError, setPasswordError] = useState(false);

    useEffect(() => {
      try {
        if (editMode) sessionStorage.setItem('LouvorApp:editMode', '1');
        else sessionStorage.removeItem('LouvorApp:editMode');
      } catch {}
    }, [editMode]);

    // Auto-save com debounce
    useEffect(() => {
      const t = setTimeout(() => {
        saveLocalData({ roles, members, unavailability, roster, customEvents, eventNotes });
      }, 250);
      return () => clearTimeout(t);
    }, [roles, members, unavailability, roster, customEvents, eventNotes]);

    // Toast helper
    const showToast = (msg, type = 'success') => {
      setToast({ msg, type });
      setTimeout(() => setToast(null), 2500);
    };

    // Helper: bloqueia ações se não estiver em modo edição
    const requireEdit = () => {
      if (!editMode) {
        showToast('🔒 Modo navegação — desbloqueie pra editar', 'info');
        return false;
      }
      return true;
    };

    // Toggle do cadeado: trava direto, ou pede senha pra destravar
    const handleToggleLock = () => {
      if (editMode) {
        setEditMode(false);
        showToast('🔒 Modo navegação ativado');
      } else {
        setPasswordInput('');
        setPasswordError(false);
        setShowPasswordModal(true);
      }
    };

    const handleSubmitPassword = (e) => {
      if (e) e.preventDefault();
      if (passwordInput === ADMIN_PASSWORD) {
        setEditMode(true);
        setShowPasswordModal(false);
        setPasswordInput('');
        setPasswordError(false);
        showToast('🔓 Modo edição liberado!');
      } else {
        setPasswordError(true);
        setTimeout(() => setPasswordError(false), 2000);
      }
    };

    // ================================================================
    // DATAS COMBINADAS: Domingos automáticos + Eventos Customizados
    // ================================================================
    const dates = useMemo(() => {
      const sundays = getNextSundays(baseDate, weeksToShow).map(d => ({
        date: d,
        dateStr: toISODate(d),
        title: 'Culto de Domingo',
        type: 'sunday',
        time: '',
        isAuto: true
      }));

      // Janela de visualização: do início (-1 dia) até o último domingo +6 dias
      const minDate = new Date(baseDate); minDate.setHours(0, 0, 0, 0);
      const maxDate = sundays.length > 0 ? new Date(sundays[sundays.length - 1].date) : new Date(baseDate);
      maxDate.setDate(maxDate.getDate() + 6);

      const customInWindow = customEvents
        .filter(e => {
          const d = fromISODate(e.date);
          return d >= minDate && d <= maxDate;
        })
        .map(e => ({
          date: fromISODate(e.date),
          dateStr: e.date,
          title: e.title || EVENT_TYPES[e.type]?.label || 'Evento',
          type: e.type,
          time: e.time || '',
          isAuto: false,
          eventId: e.id
        }));

      // Mesclar - evento custom em mesma data substitui o domingo automático
      const merged = [...sundays];
      customInWindow.forEach(e => {
        const idx = merged.findIndex(m => m.dateStr === e.dateStr);
        if (idx >= 0) merged[idx] = e;
        else merged.push(e);
      });

      return merged.sort((a, b) => a.date - b.date);
    }, [baseDate, customEvents, weeksToShow]);

    // Grid balanceado: escolhe entre 3 ou 4 colunas pra evitar linhas órfãs
    // Score = quão "cheia" fica a última fileira. Divisão exata vence sempre.
    const optimalCols = useMemo(() => {
      const n = dates.length;
      if (n <= 0) return 3;
      if (n <= 3) return n;
      const candidates = [3, 4];
      let best = 3, bestScore = -1;
      for (const c of candidates) {
        const remainder = n % c;
        const score = remainder === 0 ? Infinity : remainder / c;
        if (score > bestScore || (score === bestScore && c > best)) {
          best = c; bestScore = score;
        }
      }
      return best;
    }, [dates.length]);

    // ================================================================
    // NAVEGAÇÃO DE DATAS
    // ================================================================
    const shiftWeeks = (n) => {
      const nd = new Date(baseDate);
      nd.setDate(nd.getDate() + (n * 7));
      setBaseDate(nd);
    };

    // ================================================================
    // MEMBROS
    // ================================================================
    const handleAddRoleToNewMember = (rk) => {
      if (newMemberRoles.length >= 7) return alert("Máximo 7 categorias permitidas");
      if (!newMemberRoles.includes(rk)) setNewMemberRoles([...newMemberRoles, rk]);
    };
    const handleRemoveRoleFromNewMember = (rk) => {
      if (newMemberRoles.length <= 1) return;
      setNewMemberRoles(newMemberRoles.filter(r => r !== rk));
    };
    const handleAddMember = (e) => {
      e.preventDefault();
      if (!requireEdit()) return;
      if (!newMemberName.trim()) return;
      const id = members.length > 0 ? Math.max(...members.map(m => m.id)) + 1 : 1;
      setMembers([...members, { id, name: newMemberName, roles: newMemberRoles }]);
      setNewMemberName(''); setNewMemberRoles(['VOCAL']);
      setShowAddMemberModal(false);
      showToast('Membro adicionado!');
    };
    const handleDeleteMember = (id) => {
      if (!requireEdit()) return;
      if (confirm('Remover este membro?')) {
        setMembers(members.filter(m => m.id !== id));
        showToast('Membro removido');
      }
    };
    const startEditingMember = (m) => {
      if (!requireEdit()) return;
      setEditingMemberId(m.id); setEditName(m.name); setEditRoles([...m.roles]);
    };
    const handleAddRoleEdit = (rk) => {
      if (editRoles.length >= 7) return alert("Máximo 7 categorias permitidas");
      if (!editRoles.includes(rk)) setEditRoles([...editRoles, rk]);
    };
    const handleRemoveRoleEdit = (rk) => {
      if (editRoles.length <= 1) return;
      setEditRoles(editRoles.filter(r => r !== rk));
    };
    const saveMemberEdit = () => {
      if (!editName.trim()) return;
      setMembers(members.map(m => m.id === editingMemberId ? { ...m, name: editName, roles: editRoles } : m));
      setEditingMemberId(null);
    };

    // ================================================================
    // CATEGORIAS
    // ================================================================
    const handleAddCategory = (e) => {
      e.preventDefault();
      if (!requireEdit()) return;
      if (!newCategoryName.trim()) return;
      const k = newCategoryName.toUpperCase().replace(/\s+/g, '_').normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      if (roles[k]) return alert('Já existe categoria com este nome');
      setRoles({ ...roles, [k]: { label: newCategoryName, color: newCategoryColor } });
      setNewCategoryName(''); setShowAddCategoryModal(false);
      showToast('Categoria adicionada!');
    };
    const handleDeleteCategory = (k) => {
      if (!requireEdit()) return;
      if (members.some(m => m.roles.includes(k))) return alert('Categoria em uso por membros');
      if (confirm('Excluir categoria?')) {
        const r = { ...roles }; delete r[k]; setRoles(r);
        showToast('Categoria removida');
      }
    };
    const startEditingCategory = (k) => {
      if (!requireEdit()) return;
      setEditingCategoryKey(k); setEditCategoryName(roles[k].label); setEditCategoryColor(roles[k].color);
    };
    const saveCategoryEdit = () => {
      if (!editCategoryName.trim()) return;
      setRoles({ ...roles, [editingCategoryKey]: { ...roles[editingCategoryKey], label: editCategoryName, color: editCategoryColor } });
      setEditingCategoryKey(null);
    };

    // ================================================================
    // EVENTOS CUSTOMIZADOS
    // ================================================================
    const handleAddEvent = (e) => {
      e.preventDefault();
      if (!requireEdit()) return;
      if (!newEventDate) return;
      const id = Date.now();
      const title = newEventTitle.trim() || EVENT_TYPES[newEventType].label;
      setCustomEvents([...customEvents, {
        id, date: newEventDate, type: newEventType, title, time: newEventTime
      }]);
      setNewEventTitle(''); setNewEventTime('19:30');
      setShowAddEventModal(false);
      // Reposicionar visualização para incluir a data adicionada
      const eventDate = fromISODate(newEventDate);
      const diff = Math.floor((eventDate - new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate())) / (1000 * 60 * 60 * 24));
      if (diff < 0 || diff > weeksToShow * 7) {
        setBaseDate(eventDate);
      }
      showToast('Data adicionada!');
    };
    const handleDeleteEvent = (id) => {
      if (!requireEdit()) return;
      if (confirm('Remover este evento?')) {
        setCustomEvents(customEvents.filter(ev => ev.id !== id));
        showToast('Evento removido');
      }
    };

    // ================================================================
    // Disponibilidade 🔋 ❌ / ESCALA
    // ================================================================
    const toggleUnavailability = (d, id) => {
      if (!requireEdit()) return;
      setUnavailability(prev => {
        const l = prev[d] || [];
        return { ...prev, [d]: l.includes(id) ? l.filter(x => x !== id) : [...l, id] };
      });
    };
    const toggleRosterMember = (d, id, rk) => {
      if (!requireEdit()) return;
      const a = `${id}:${rk}`;
      setRoster(prev => {
        const l = prev[d] || [];
        return { ...prev, [d]: l.includes(a) ? l.filter(x => x !== a) : [...l, a] };
      });
    };
    const isUnavailable = (d, id) => unavailability[d]?.includes(id);
    const isInRoster = (d, id, rk) => roster[d]?.includes(`${id}:${rk}`);

    // Conflitos: membro escalado em data marcada como indisponível
    const conflicts = useMemo(() => {
      const list = [];
      dates.forEach(d => {
        const assigns = roster[d.dateStr] || [];
        assigns.forEach(a => {
          const [mId, rKey] = a.split(':');
          const memberId = parseInt(mId);
          if (isUnavailable(d.dateStr, memberId)) {
            const mem = members.find(m => m.id === memberId);
            if (mem) list.push({ date: d.dateStr, dateLabel: formatDateShort(d.date), member: mem.name, role: roles[rKey]?.label });
          }
        });
      });
      return list;
    }, [dates, roster, unavailability, members, roles]);

    // Stats / Balanceamento — conta DIAS escalado dentro do RANGE VISÍVEL
    const stats = useMemo(() => {
      const visibleDateStrs = new Set(dates.map(d => d.dateStr));
      const memberDays = {};
      members.forEach(m => { memberDays[m.id] = 0; });

      Object.entries(roster).forEach(([dateStr, arr]) => {
        if (!visibleDateStrs.has(dateStr)) return; // só conta datas visíveis
        const memberSet = new Set();
        arr.forEach(a => {
          const [mId] = a.split(':');
          memberSet.add(parseInt(mId));
        });
        memberSet.forEach(id => {
          if (memberDays[id] !== undefined) memberDays[id]++;
        });
      });

      const totalDays = dates.length;
      const sorted = members
        .map(m => ({ ...m, count: memberDays[m.id] || 0 }))
        .sort((a, b) => b.count - a.count);
      return { sorted, max: totalDays || 1, totalDays };
    }, [members, roster, dates]);

    // Cor da barra: verde (≥2 folgas), amarelo (1 folga), vermelho (sem folga)
    const getBarColor = (count, max) => {
      if (count === 0) return 'bg-slate-300';
      if (count >= max) return 'bg-rose-500';
      if (count === max - 1) return 'bg-amber-500';
      return 'bg-emerald-500';
    };

    // ================================================================
    // EXPORTAÇÃO: Salvar HTML, PDF (print), PNG, Copy
    // ================================================================
    const handleSaveAs = () => {
      if (!requireEdit()) return;
      const now = new Date();
      const dStr = now.toLocaleDateString('pt-BR').replace(/\//g, '-');
      const fName = `LouvorApp_${dStr}.html`;
      
      const cData = { roles, members, unavailability, roster, customEvents, eventNotes };
      const b64 = toBase64(JSON.stringify(cData));
      saveLocalData(cData);

      // Pega o conteúdo dos elementos base do código original (sem clonar o DOM inteiro)
      const styleNode = document.getElementById('app-style');
      const scriptNode = document.getElementById('app-script');

      if (!styleNode || !scriptNode) {
        showToast('Erro crítico: Molde original não encontrado. Recarregue a página.', 'error');
        return;
      }

      const styleContent = styleNode.textContent;
      const scriptContent = scriptNode.textContent;

      // Busca e troca os dados salvos dentro da string pura do React
      const holderRegex = /(\/\/\s*DATA_HOLDER_START[\s\S]*?\b(?:const|var|let)\s+DATA_B64\s*=\s*")(.*?)(";[\s\S]*?\/\/\s*DATA_HOLDER_END)/g;
      
      if (!holderRegex.test(scriptContent)) {
        showToast("Erro: marcador DATA_HOLDER não encontrado no código.", 'error');
        return;
      }
      
      const newScriptContent = scriptContent.replace(holderRegex, `$1${b64}$3`);

      // Usa um truque simples com strings para as tags de script
      const sTagOpen = "<" + "script>";
      const sTagClose = "</" + "script>";

      // Remonta o arquivo HTML exato do zero usando a Template String limpa
      // Isso ignora TUDO que o Tailwind e o Babel injetaram no navegador, garantindo perfeição.
      const cleanHTML = `<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LouvorApp - Ministério de Louvor</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js">${sTagClose}
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js">${sTagClose}
<script src="https://unpkg.com/@babel/standalone/babel.min.js">${sTagClose}
<script src="https://cdn.tailwindcss.com">${sTagClose}
${sTagOpen}
  tailwind.config = { darkMode: 'class' };
${sTagClose}
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js">${sTagClose}
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js">${sTagClose}
<style id="app-style">${styleContent}</style>
</head>
<body class="bg-slate-50 text-slate-800">
<div id="root"></div>
<script type="text/babel" data-presets="react" id="app-script">${newScriptContent}${sTagClose}
</body>
</html>`;

      const blob = new Blob([cleanHTML], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url; link.download = fName;
      document.body.appendChild(link); link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast('Arquivo salvo perfeitamente com todas as funções!');
    };

    const handlePrintPDF = () => {
      // Garante tema claro durante impressão (visualmente, o CSS @media print já força)
      window.print();
    };

    const captureRef = useRef(null);

    // Usa biblioteca html-to-image (muito superior para Tailwind)
    const handleExportPNG = async (action = 'download') => {
      const node = captureRef.current;
      if (!node) {
        showToast('Erro: área de captura não encontrada', 'error');
        return;
      }
      if (node.offsetHeight === 0) {
        showToast('Mude para a aba Visão Geral primeiro', 'error');
        return;
      }
      if (typeof window.htmlToImage === 'undefined') {
        showToast('Biblioteca html-to-image não carregou. Verifique a internet.', 'error');
        return;
      }

      showToast('Gerando imagem limpa... (aguarde)', 'info');
      
      // Temporariamente remove o dark mode para o print sair limpo com fundo claro
      const wasDark = document.documentElement.classList.contains('dark');
      if (wasDark) document.documentElement.classList.remove('dark');
      
      node.classList.add('capturing');

      // Aguarda o React/Navegador aplicar a classe e redesenhar a tela
      await new Promise(r => setTimeout(r, 100));

      try {
        const blob = await window.htmlToImage.toBlob(node, {
          quality: 1,
          pixelRatio: 2, // Maior resolução para não borrar
          backgroundColor: '#f8fafc', // Fundo original (slate-50 do tailwind)
          style: {
            margin: '0',
            padding: '16px', // Espaçamento em volta pra ficar bonito
            borderRadius: '0',
          },
          filter: (domNode) => {
            // Ignora botões de edição, lixeiras, barras de rolagem que tem classe no-print
            if (domNode.classList && domNode.classList.contains('no-print')) return false;
            return true;
          }
        });

        if (!blob) throw new Error("A imagem retornou vazia");

        const filename = `Escala_Louvor_${toISODate(new Date())}.png`;

        if (action === 'copy') {
          try {
            if (!window.isSecureContext) throw new Error('Cópia bloqueada (precisa de HTTPS ou localhost)');
            if (!navigator.clipboard?.write || !window.ClipboardItem) throw new Error('API do Clipboard não suportada no seu navegador');
            
            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
            showToast('Imagem perfeita copiada! Pode colar no WhatsApp 📱');
          } catch (copyError) {
            console.warn('[ExportPNG] Fallback para modal devido a bloqueio do clipboard:', copyError);
            const url = URL.createObjectURL(blob);
            setExportImageModal(url);
            showToast('Cópia automática bloqueada. Copie manualmente na tela!', 'info');
          }
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 5000);
          showToast('Imagem baixada com sucesso!');
        }

      } catch (e) {
        console.error('[ExportPNG] Falha:', e);
        showToast(`Erro na geração: ${e.message}`, 'error');

        text += `_${formatDateShort(dates[0].date)} a ${formatDateShort(dates[dates.length - 1].date)}_\n`;

      text += `\n━━━━━━━━━━━━━━━\n\n`;
      text += `*📅 ESCALA*\n\n`;

      dates.forEach(d => {
        const ds = d.dateStr;
        const assigns = roster[ds] || [];
        const evType = EVENT_TYPES[d.type] || EVENT_TYPES.sunday;
        const wd = d.date.toLocaleDateString('pt-BR', { weekday: 'long' });
        const wdCap = wd.charAt(0).toUpperCase() + wd.slice(1);

        text += `${evType.icon} *${wdCap}, ${formatDateShort(d.date)}*`;
        if (d.time) text += ` _• ${d.time}_`;
        text += `\n`;
        if (!d.isAuto) text += `_${d.title}_\n`;
        if (eventNotes[ds]) text += `📝 _${eventNotes[ds]}_\n`;

        const byRole = {};
        assigns.forEach(a => {
          const [mId, rKey] = a.split(':');
          const mem = members.find(m => m.id === parseInt(mId));
          if (mem && roles[rKey]) {
            if (!byRole[rKey]) byRole[rKey] = [];
            byRole[rKey].push(mem.name);
          }
        });

        if (Object.keys(byRole).length === 0) {
          text += `_(sem escala definida)_\n`;
        } else {
          Object.keys(roles).forEach(rk => {
            if (byRole[rk]) {
              text += `• *${roles[rk].label}:* ${byRole[rk].join(', ')}\n`;
            }
          });
        }
        text += `\n`;
      });

      // InDisponibilidade 🔋 ❌s
      const unavailLines = [];
      members.forEach(m => {
        const ud = dates.filter(d => isUnavailable(d.dateStr, m.id))
                        .map(d => formatDateShort(d.date));
        if (ud.length > 0) unavailLines.push(`• *${m.name}:* ${ud.join(', ')}`);
      });
      if (unavailLines.length > 0) {
        text += `━━━━━━━━━━━━━━━\n\n*✗ INDisponibilidade 🔋 ❌S*\n\n`;
        text += unavailLines.join('\n') + '\n\n';

      // Balanceamento (apenas no range visível)
      text += `━━━━━━━━━━━━━━━\n\n*📊 BALANCEAMENTO* _(em ${stats.totalDays} ${stats.totalDays === 1 ? 'culto' : 'cultos'} visualizados)_\n\n`;

        const folgas = stats.totalDays - m.count;

        text += `• ${m.name}: *${m.count}/${stats.totalDays}*${tag}\n`;
      });
      const semEscala = stats.sorted.filter(m => m.count === 0);
      if (semEscala.length > 0) {
        text += `\n_Sem escala neste período:_ ${semEscala.map(m => m.name).join(', ')}\n`;
      }

      text += `\n━━━━━━━━━━━━━━━\n_Gerado em ${new Date().toLocaleDateString('pt-BR')} via LouvorApp_`;
      return text;
    };

        {showPasswordModal && (
          <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 no-print">
            <form onSubmit={handleSubmitPassword} className="bg-white p-6 rounded-xl w-full max-w-sm shadow-2xl space-y-4 animate-fade-in">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center">
                  <Lock size={22} />
                </div>
                <div>
                  <h3 className="font-bold text-lg">Liberar Edição</h3>
                  <p className="text-xs text-slate-500">Digite a senha para destravar</p>
                </div>
              </div>
              <div>
                <input
                  type="password"
                  autoFocus
                  value={passwordInput}
                  onChange={e => { setPasswordInput(e.target.value); setPasswordError(false); }}
                  placeholder="Senha"
                  className={`w-full border p-3 rounded-lg text-sm transition ${passwordError ? 'border-rose-500 ring-2 ring-rose-200' : 'border-slate-300 focus:border-indigo-500'}`}
                />
                {passwordError && (
                  <p className="text-xs text-rose-600 mt-1.5 flex items-center gap-1">
                    <AlertTriangle size={12} /> Senha incorreta
                  </p>
                )}
              </div>
              <div className="flex gap-3 pt-1">
                <button type="submit" className="flex-1 bg-emerald-600 text-white py-2.5 rounded-lg font-medium shadow hover:bg-emerald-700 flex items-center justify-center gap-2">
                  <LockOpen size={16} /> Desbloquear
                </button>
                <button type="button" onClick={() => { setShowPasswordModal(false); setPasswordInput(''); setPasswordError(false); }} className="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-lg font-medium">
                  Cancelar
                </button>
              </div>
            </form>
          </div>
        )}

        {/* MODAL: Adicionar Evento */}
        {showAddEventModal && (
          <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 no-print">
            <div className="bg-white p-6 rounded-xl w-full max-w-md shadow-2xl space-y-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center"><CalendarPlus size={20} /></div>
                <div>
                  <h3 className="font-bold text-lg">Adicionar Data</h3>
                  <p className="text-xs text-slate-500">Crie um culto, ensaio ou evento avulso</p>
                </div>
              </div>
              <div>
                <label className="text-xs text-slate-500 font-bold mb-1 block">Tipo de Evento</label>
                <div className="grid grid-cols-2 gap-2">
                  {Object.entries(EVENT_TYPES).map(([k, v]) => (
                    <button key={k} type="button" onClick={() => setNewEventType(k)}
                      className={`px-3 py-2 rounded-lg text-sm font-medium border transition flex items-center gap-2 ${newEventType === k ? `${v.color} text-white border-transparent shadow` : 'bg-white text-slate-700 hover:border-indigo-400'}`}>
                      <span>{v.icon}</span> <span className="truncate text-xs">{v.label}</span>
                    </button>
                  ))}
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs text-slate-500 font-bold mb-1 block">Data</label>
                  <input type="date" className="w-full border p-2.5 rounded-lg text-sm" value={newEventDate} onChange={e => setNewEventDate(e.target.value)} />
                </div>
                <div>
                  <label className="text-xs text-slate-500 font-bold mb-1 block">Horário</label>
                  <input type="time" className="w-full border p-2.5 rounded-lg text-sm" value={newEventTime} onChange={e => setNewEventTime(e.target.value)} />
                </div>
              </div>
              <div>
                <label className="text-xs text-slate-500 font-bold mb-1 block">Título (opcional)</label>
                <input className="w-full border p-2.5 rounded-lg text-sm" placeholder={EVENT_TYPES[newEventType].label} value={newEventTitle} onChange={e => setNewEventTitle(e.target.value)} />
              </div>
              <div className="flex gap-3 pt-2">
                <button onClick={handleAddEvent} className="flex-1 bg-emerald-600 text-white py-2.5 rounded-lg font-medium shadow hover:bg-emerald-700">Adicionar</button>
                <button onClick={() => setShowAddEventModal(false)} className="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-lg font-medium">Cancelar</button>
              </div>
            </div>
          </div>
        )}

        {/* MODAL: Notas do Evento */}
        {showNotesModal && (
          <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 no-print">
            <div className="bg-white p-6 rounded-xl w-full max-w-md shadow-2xl space-y-4">
              <h3 className="font-bold text-lg flex items-center gap-2"><StickyNote size={20} className="text-amber-500" /> Nota do Culto</h3>
              <p className="text-xs text-slate-500">Data: <strong>{showNotesModal}</strong></p>
              <textarea
                className="w-full border p-3 rounded-lg text-sm h-32 resize-none"
                placeholder="Ex: Tema do culto, observações para a equipe, batismo após o culto..."
                value={eventNotes[showNotesModal] || ''}
                onChange={e => setEventNotes({ ...eventNotes, [showNotesModal]: e.target.value })}
              />
              <div className="flex gap-3">
                <button onClick={() => { setShowNotesModal(null); showToast('Nota salva!'); }} className="flex-1 bg-indigo-600 text-white py-2.5 rounded-lg font-medium shadow">Salvar</button>
                {eventNotes[showNotesModal] && (
                  <button onClick={() => { const n = { ...eventNotes }; delete n[showNotesModal]; setEventNotes(n); setShowNotesModal(null); }}
                    className="px-4 bg-rose-50 text-rose-600 py-2.5 rounded-lg font-medium">
                    Apagar
                  </button>
                )}
                <button onClick={() => setShowNotesModal(null)} className="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-lg font-medium">Cancelar</button>
              </div>
            </div>
          </div>
        )}

        {/* MODAL: Exportar Imagem (Fallback para Cópia) */}
        {exportImageModal && (
          <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 no-print flex-col">
            <div className="bg-white p-4 rounded-xl max-w-4xl w-full max-h-[95vh] flex flex-col shadow-2xl">
              <div className="flex justify-between items-center mb-3 shrink-0">
                <h3 className="font-bold text-lg flex items-center gap-2"><ImageIcon size={20} className="text-indigo-500" /> Copiar Imagem</h3>
                <button onClick={() => setExportImageModal(null)} className="p-1 hover:bg-slate-100 rounded-full"><X size={20} /></button>
              </div>
              <div className="bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded-lg mb-4 text-sm shrink-0">
                <strong>Atenção:</strong> Seu navegador não permite a cópia automática de imagens por segurança. 
                Para compartilhar, <strong>clique com o botão direito na imagem abaixo</strong> (ou segure apertado no celular) e selecione <strong>"Copiar imagem"</strong>, depois é só colar no WhatsApp!
              </div>
              <div className="flex-1 overflow-y-auto bg-slate-100 rounded border flex justify-center p-4">
                <img src={exportImageModal} alt="Escala Gerada" className="max-w-full h-auto shadow-sm bg-white" style={{ objectFit: 'contain' }} />
              </div>
              <div className="mt-4 flex gap-3 shrink-0">
                 <button onClick={() => {
                   const a = document.createElement('a');
                   a.href = exportImageModal; a.download = `Escala_Louvor.png`;
                   a.click();
                 }} className="flex-1 bg-indigo-600 text-white py-2.5 rounded-lg font-medium shadow hover:bg-indigo-700">Baixar Imagem</button>
                 <button onClick={() => setExportImageModal(null)} className="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-lg font-medium hover:bg-slate-200">Fechar</button>
              </div>
            </div>
          </div>
        )}

        {/* MODAL: Texto WhatsApp (fallback se clipboard falhar) */}
        {showTextModal && (
          <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 no-print">
            <div className="bg-white p-6 rounded-xl w-full max-w-2xl shadow-2xl space-y-4">
              <div className="flex items-center justify-between">
                <h3 className="font-bold text-lg flex items-center gap-2"><FileText size={20} className="text-blue-500" /> Texto pra WhatsApp</h3>
                <button onClick={() => setShowTextModal(null)}><X size={20} /></button>
              </div>
              <p className="text-xs text-slate-500">Selecione o texto abaixo e copie (Ctrl+A → Ctrl+C):</p>
              <textarea
                readOnly
                onFocus={e => e.target.select()}
                className="w-full border p-3 rounded-lg text-xs h-80 resize-none font-mono bg-slate-50"
                value={showTextModal}
              />
              <div className="flex gap-3">
                <button onClick={async () => {
                  try { await navigator.clipboard.writeText(showTextModal); showToast('Copiado!'); setShowTextModal(null); }
                  catch { showToast('Selecione manualmente', 'error'); }
                }} className="flex-1 bg-blue-600 text-white py-2.5 rounded-lg font-medium shadow">Tentar copiar de novo</button>
                <button onClick={() => setShowTextModal(null)} className="flex-1 bg-slate-100 text-slate-600 py-2.5 rounded-lg font-medium">Fechar</button>
              </div>
            </div>
          </div>
        )}

        {/* TOAST */}
        {toast && (
          <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] px-4 py-3 rounded-lg shadow-2xl toast-enter no-print ${
            toast.type === 'error' ? 'bg-rose-600 text-white' :
            toast.type === 'info' ? 'bg-slate-800 text-white' :
            'bg-emerald-600 text-white'
          }`}>
            <div className="flex items-center gap-2 text-sm font-medium">
              {toast.type === 'error' ? <AlertTriangle size={16} /> : toast.type === 'info' ? <Sparkles size={16} /> : <CheckCircle2 size={16} />}
              {toast.msg}
            </div>
          </div>
        )}

      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(MinistryScheduler));
</script>
</body>
</html>
